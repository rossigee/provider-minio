# Custom Release Workflow for provider-minio
# Publishes to ghcr.io/rossigee using the crossplane build system.
#
# Uses fetch-depth: 0 + submodules: false so that git fetch --unshallow is
# never needed and the stale crossplane/build submodule history is never
# traversed. The build submodule is initialised shallowly for the current
# commit only.

name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to release (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0       # full history — no --unshallow needed
          submodules: false    # skip recursive submodule checkout; we init manually below

      - name: Init build submodule (current commit only)
        run: git submodule update --init --depth 1 build

      - name: Determine Version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.3'
          cache: true

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.PAT_TOKEN }}

      - name: Vendor Dependencies
        run: go mod vendor

      - name: Install Build Tools
        run: make build.init

      - name: Build and Publish Artifacts
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BRANCH_NAME: master   # override: tag-based builds are in detached HEAD state
        run: |
          set -e
          echo "Building version ${VERSION}"
          make publish.artifacts \
            REGISTRY_ORGS="ghcr.io/${{ github.repository_owner }}" \
            XPKG_REG_ORGS="ghcr.io/${{ github.repository_owner }}" \
            BRANCH_NAME=master

      - name: Verify Publication
        run: |
          set -e
          VERSION="${{ steps.version.outputs.version }}"
          REGISTRY_PATH="ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}"

          echo "Verifying publication to ${REGISTRY_PATH}:${VERSION}"

          if docker pull "${REGISTRY_PATH}:${VERSION}" > /dev/null 2>&1; then
            echo "✅ Verified container image ${VERSION}"
          else
            echo "❌ Failed to pull container image ${VERSION}"
            exit 1
          fi

          if docker pull "${REGISTRY_PATH}:latest" > /dev/null 2>&1; then
            echo "✅ Verified container image latest"
          else
            echo "❌ Failed to pull container image latest"
            exit 1
          fi

          VERSION_DIGEST=$(docker inspect "${REGISTRY_PATH}:${VERSION}" --format='{{index .RepoDigests 0}}' | cut -d'@' -f2)
          LATEST_DIGEST=$(docker inspect "${REGISTRY_PATH}:latest" --format='{{index .RepoDigests 0}}' | cut -d'@' -f2)

          if [ "$VERSION_DIGEST" = "$LATEST_DIGEST" ]; then
            echo "✅ Version and latest tags point to identical image"
            echo "   Digest: ${VERSION_DIGEST}"
          else
            echo "❌ Version and latest tags point to different images"
            echo "   Version digest: ${VERSION_DIGEST}"
            echo "   Latest digest:  ${LATEST_DIGEST}"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
