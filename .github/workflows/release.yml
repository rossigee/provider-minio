# Custom Release Workflow for provider-minio
# Publishes to ghcr.io/rossigee using the crossplane build system.
#
# Uses fetch-depth: 0 + submodules: false so that git fetch --unshallow is
# never needed and the stale crossplane/build submodule history is never
# traversed. The build submodule is initialised shallowly for the current
# commit only.
name: Release (Official Workflows)

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to release (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Init build submodule (current commit only)
        run: git submodule update --init --depth 1 build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: false

      - name: Determine Version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: true

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build Artifacts
        run: |
          set -e  # Fail fast on any error

          # Use the standardized build system to handle everything
          export VERSION="${{ steps.version.outputs.version }}"

          echo "Repository: ${{ github.repository }}"
          echo "Repository owner: ${{ github.repository_owner }}"
          echo "Version: ${VERSION}"

          # CRITICAL: Override BRANCH_NAME to bypass release branch filter
          # When pushing tags, git is in detached HEAD state and branch detection fails.
          # Without this, publish.artifacts becomes an empty target that silently succeeds.
          # See: build/makelib/xpkg.mk:125-127 and build/makelib/common.mk:87
          export BRANCH_NAME="master"

          # Build binary and artifacts for the current platform
          make build.all build.artifacts

      - name: Upload XPKG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: xpkg
          path: _output/xpkg/linux_amd64/provider-minio-${{ steps.version.outputs.version }}.xpkg

  publish:
    runs-on: ubuntu-24.04
    needs: release
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'

      - name: Vendor Dependencies
        run: go mod vendor

      - name: Install Build Tools
        run: make build.init

      - name: Determine Version
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build and Publish Artifacts
        env:
          BRANCH_NAME: master   # override: tag-based builds are in detached HEAD state
        run: |
          set -e
          echo "Building version ${VERSION}"
          make publish.artifacts \
            REGISTRY_ORGS="ghcr.io/${{ github.repository_owner }}" \
            XPKG_REG_ORGS="ghcr.io/${{ github.repository_owner }}" \
            BRANCH_NAME=master

      - name: Verify Publication
        run: |
          set -e
          VERSION="${GITHUB_REF#refs/tags/}"
          REGISTRY_PATH="ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}"

          echo "Verifying publication to ${REGISTRY_PATH}:${VERSION}"
          if docker pull "${REGISTRY_PATH}:${VERSION}" > /dev/null 2>&1; then
            DIGEST=$(docker inspect "${REGISTRY_PATH}:${VERSION}" --format='{{index .RepoDigests 0}}' | cut -d'@' -f2)
            echo "✅ Verified container image ${VERSION} (${DIGEST})"
          else
            echo "❌ Failed to pull container image ${VERSION}"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true

  # Add publication verification (preserves your custom verification)
  verify-publication:
    needs: publish
    runs-on: ubuntu-24.04
    steps:
      - name: Verify Publication
        run: |
          set -e  # Fail fast on any error

          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          PROVIDER_NAME="${{ github.event.repository.name }}"
          REGISTRY_PATH="ghcr.io/rossigee/${PROVIDER_NAME}"

          echo "Verifying publication to ${REGISTRY_PATH}:${VERSION}"

          # Verify version tag exists and is pullable
          if docker pull "${REGISTRY_PATH}:${VERSION}" > /dev/null 2>&1; then
            echo "✅ Verified container image latest"
          else
            echo "❌ Failed to pull container image latest"
            exit 1
          fi

          # Verify both tags point to same image (identical digests)
          VERSION_DIGEST=$(docker inspect "${REGISTRY_PATH}:${VERSION}" --format='{{index .RepoDigests 0}}' | cut -d'@' -f2)
          LATEST_DIGEST=$(docker inspect "${REGISTRY_PATH}:latest" --format='{{index .RepoDigests 0}}' | cut -d'@' -f2)

          if [ "$VERSION_DIGEST" = "$LATEST_DIGEST" ]; then
            echo "✅ Version and latest tags point to identical image"
            echo "   Digest: ${VERSION_DIGEST}"
          else
            echo "❌ Version and latest tags point to different images"
            echo "   Version digest: ${VERSION_DIGEST}"
            echo "   Latest digest:  ${LATEST_DIGEST}"
            exit 1
          fi
